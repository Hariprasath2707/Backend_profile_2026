<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Palette reference — Hariprasath portfolio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=JetBrains+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: ui-sans-serif, system-ui, sans-serif;
    background: #1a1a1a;
    color: #eee;
    padding: 40px 32px 80px;
  }
  h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 28px; letter-spacing: -0.02em; }
  .sub { color: #999; margin: 10px 0 36px; font-size: 14px; line-height: 1.6; max-width: 720px; }
  .sub b { color: #ddd; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 26px;
  }
  .card {
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 50px -20px rgba(0,0,0,0.6);
  }
  .label {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 16px;
    font: 500 12px/1 'JetBrains Mono', monospace;
    letter-spacing: 0.08em;
    background: #111; color: #ccc;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .swatches { display: flex; gap: 5px; }
  .sw { width: 14px; height: 14px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.15); }

  /* themed mock — variables set per card via inline style */
  .mock {
    padding: 22px 22px 24px;
    background:
      radial-gradient(120% 80% at 0% -10%, var(--glow), transparent 60%),
      radial-gradient(90% 60% at 100% 110%, var(--glow2), transparent 55%),
      var(--ink);
    color: var(--paper);
  }
  .eyebrow { font: 500 9.5px/1 'JetBrains Mono', monospace; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); }
  .name { font-family: 'Fraunces', serif; font-weight: 600; font-size: 34px; letter-spacing: -0.03em; margin: 9px 0 0; line-height: 1; }
  .name .dot { color: var(--accent); }
  .tag { color: var(--muted); font-size: 12.5px; margin-top: 9px; line-height: 1.5; max-width: 90%; }
  .btns { display: flex; gap: 9px; margin-top: 15px; }
  .btn-primary { background: var(--accent); color: var(--ink); font: 600 10px/1 'JetBrains Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 16px; border-radius: 999px; }
  .btn-ghost { border: 1px solid var(--line); color: var(--muted); font: 600 10px/1 'JetBrains Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 16px; border-radius: 999px; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 20px; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 14px 0; }
  .stat .num { font-family: 'Fraunces', serif; font-weight: 600; font-size: 19px; color: var(--paper); letter-spacing: -0.02em; }
  .stat .num span { color: var(--accent); }
  .stat .lbl { font: 500 8px/1.3 'JetBrains Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
  .chip { font: 500 9.5px/1 'JetBrains Mono', monospace; letter-spacing: 0.04em; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 6px 10px; background: var(--surface); }

  .proj { margin-top: 16px; border: 1px solid var(--line); border-radius: 12px; padding: 14px; background: var(--surface); }
  .proj-top { display: flex; align-items: baseline; justify-content: space-between; }
  .proj-title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 16px; letter-spacing: -0.02em; }
  .proj-year { font: 500 9px 'JetBrains Mono', monospace; color: var(--muted); }
  .proj-blurb { color: var(--muted); font-size: 11px; line-height: 1.5; margin-top: 7px; }
  .proj-tags { display: flex; gap: 6px; margin-top: 10px; }
  .proj-tag { font: 500 8.5px 'JetBrains Mono', monospace; color: var(--accent); }

  .terminal { margin-top: 16px; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; background: var(--surface); }
  .term-bar { display: flex; gap: 6px; align-items: center; padding: 8px 12px; border-bottom: 1px solid var(--line); }
  .term-bar i { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .term-body { padding: 12px 14px; font: 500 10.5px/1.65 'JetBrains Mono', monospace; }
  .term-body .m { color: var(--accent); }
  .term-body .k { color: var(--accent2); }
  .term-body .c { color: var(--muted); }
</style>
</head>
<body>

  <div class="grid" id="grid"></div>

function hexA(hex, a){ const n=parseInt(hex.slice(1),16); const r=(n>>16)&255,g=(n>>8)&255,b=n&255; return `rgba(${r},${g},${b},${a})`; }

const grid = document.getElementById('grid');
